<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Claude OSINT Platform</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0e1a; color: #e0e0e0; font-family: 'Courier New', monospace; }
        
        .sidebar {
            width: 220px; height: 100vh; background: #0d1117;
            border-right: 1px solid #1e3a5f; position: fixed;
            left: 0; top: 0; padding: 20px 0; overflow-y: auto;
        }
        .sidebar-logo {
            padding: 0 20px 20px; border-bottom: 1px solid #1e3a5f;
            margin-bottom: 20px;
        }
        .sidebar-logo h2 { color: #00ff88; font-size: 16px; }
        .sidebar-logo span { color: #4a9eff; font-size: 11px; }
        .status-dot {
            display: inline-block; width: 8px; height: 8px;
            background: #00ff88; border-radius: 50%;
            margin-right: 6px; animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0%, 100% { opacity: 1; } 50% { opacity: 0.3; }
        }
        .nav-section { padding: 0 20px; margin-bottom: 15px; }
        .nav-section-title {
            color: #4a9eff; font-size: 10px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 8px;
        }
        .nav-item {
            display: flex; align-items: center; padding: 8px 12px;
            border-radius: 6px; cursor: pointer; font-size: 12px;
            color: #8892a4; margin-bottom: 2px; text-decoration: none;
            transition: all 0.2s;
        }
        .nav-item:hover, .nav-item.active {
            background: #1e3a5f; color: #00ff88;
        }
        .nav-item span { margin-right: 8px; }

        .main { margin-left: 220px; padding: 20px; min-height: 100vh; }
        
        .topbar {
            display: flex; align-items: center; justify-content: space-between;
            margin-bottom: 25px; padding-bottom: 15px;
            border-bottom: 1px solid #1e3a5f;
        }
        .topbar h1 { color: #00ff88; font-size: 18px; }
        .topbar-right { display: flex; gap: 15px; align-items: center; }
        
        .search-bar {
            display: flex; gap: 10px; background: #0d1117;
            border: 1px solid #1e3a5f; border-radius: 8px;
            padding: 10px 15px; align-items: center; flex: 1;
            max-width: 500px;
        }
        .search-bar input {
            background: none; border: none; outline: none;
            color: #e0e0e0; font-family: 'Courier New', monospace;
            font-size: 13px; flex: 1;
        }
        .search-bar input::placeholder { color: #4a5568; }
        
        .btn {
            padding: 8px 18px; border-radius: 6px; border: none;
            cursor: pointer; font-family: 'Courier New', monospace;
            font-size: 12px; font-weight: bold; transition: all 0.2s;
        }
        .btn-primary { background: #00ff88; color: #0a0e1a; }
        .btn-primary:hover { background: #00cc6a; transform: translateY(-1px); }
        .btn-danger { background: #ff4444; color: white; }
        
        .stats-grid {
            display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 15px; margin-bottom: 25px;
        }
        .stat-card {
            background: #0d1117; border: 1px solid #1e3a5f;
            border-radius: 10px; padding: 15px; text-align: center;
        }
        .stat-card .number { font-size: 28px; font-weight: bold; color: #00ff88; }
        .stat-card .label { font-size: 11px; color: #8892a4; margin-top: 4px; }
        .stat-card .sub { font-size: 10px; color: #ff4444; margin-top: 2px; }

        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 20px; }
        .grid-3 { display: grid; grid-template-columns: 2fr 1fr; gap: 20px; margin-bottom: 20px; }
        
        .card {
            background: #0d1117; border: 1px solid #1e3a5f;
            border-radius: 10px; padding: 20px;
        }
        .card h3 {
            color: #4a9eff; font-size: 13px; text-transform: uppercase;
            letter-spacing: 1px; margin-bottom: 15px;
            border-bottom: 1px solid #1e3a5f; padding-bottom: 10px;
        }

        .risk-gauge {
            display: flex; flex-direction: column; align-items: center;
            justify-content: center; padding: 20px;
        }
        .risk-number { font-size: 52px; font-weight: bold; }
        .risk-low { color: #00ff88; }
        .risk-medium { color: #ffaa00; }
        .risk-high { color: #ff4444; }
        .risk-label { font-size: 12px; color: #8892a4; margin-top: 5px; }

        .finding-item {
            display: flex; align-items: flex-start; gap: 10px;
            padding: 8px 0; border-bottom: 1px solid #1a2332; font-size: 12px;
        }
        .finding-time { color: #4a9eff; font-size: 10px; white-space: nowrap; }
        
        .info-row {
            display: flex; justify-content: space-between;
            padding: 8px 0; border-bottom: 1px solid #1a2332; font-size: 12px;
        }
        .info-row .key { color: #8892a4; }
        .info-row .val { color: #e0e0e0; font-weight: bold; }

        .badge {
            display: inline-block; padding: 2px 8px; border-radius: 4px;
            font-size: 10px; font-weight: bold;
        }
        .badge-green { background: #0d2e1a; color: #00ff88; border: 1px solid #00ff88; }
        .badge-red { background: #2e0d0d; color: #ff4444; border: 1px solid #ff4444; }
        .badge-yellow { background: #2e2000; color: #ffaa00; border: 1px solid #ffaa00; }
        .badge-blue { background: #0d1e2e; color: #4a9eff; border: 1px solid #4a9eff; }

        .quick-actions {
            display: flex; gap: 12px; flex-wrap: wrap; margin-top: 15px;
        }
        .action-btn {
            display: flex; flex-direction: column; align-items: center;
            gap: 6px; padding: 12px 20px; background: #111827;
            border: 1px solid #1e3a5f; border-radius: 8px; cursor: pointer;
            font-size: 11px; color: #8892a4; transition: all 0.2s; min-width: 100px;
        }
        .action-btn:hover { border-color: #00ff88; color: #00ff88; }
        .action-btn.active-btn { background: #00ff88; color: #0a0e1a; border-color: #00ff88; }
        .action-btn .icon { font-size: 18px; }

        .terminal {
            background: #050810; border: 1px solid #1e3a5f;
            border-radius: 8px; padding: 15px; font-size: 11px;
            max-height: 200px; overflow-y: auto; margin-top: 15px;
        }
        .terminal .line { margin-bottom: 4px; }
        .terminal .time { color: #4a9eff; }
        .terminal .ok { color: #00ff88; }
        .terminal .warn { color: #ffaa00; }
        .terminal .err { color: #ff4444; }

        .loading { display: none; text-align: center; padding: 20px; color: #4a9eff; }
        .spinner {
            display: inline-block; width: 20px; height: 20px;
            border: 2px solid #1e3a5f; border-top-color: #00ff88;
            border-radius: 50%; animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        #map { height: 250px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="sidebar-logo">
        <h2>🔍 Claude OSINT</h2>
        <span><span class="status-dot"></span>Active Session</span>
    </div>
    <div class="nav-section">
        <div class="nav-section-title">OSINT Modules</div>
        <a href="/" class="nav-item active"><span>📊</span> Dashboard</a>
        <a href="/ip-intelligence/" class="nav-item"><span>🌐</span> IP Intelligence</a>
        <a href="#" class="nav-item"><span>🔎</span> Domain Intel</a>
        <a href="#" class="nav-item"><span>🛡️</span> Threat Intel</a>
        <a href="#" class="nav-item"><span>📧</span> Email Analysis</a>
    </div>
    <div class="nav-section">
        <div class="nav-section-title">Reports</div>
        <a href="#" class="nav-item"><span>📄</span> Report History</a>
        <a href="#" class="nav-item"><span>⬇️</span> Export Reports</a>
    </div>
    <div class="nav-section">
        <div class="nav-section-title">Settings</div>
        <a href="#" class="nav-item"><span>⚙️</span> Configuration</a>
        <a href="#" class="nav-item"><span>🔑</span> API Keys</a>
    </div>
</div>

<div class="main">
    {% block content %}{% endblock %}
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
{% block scripts %}{% endblock %}
</body>
</html>
